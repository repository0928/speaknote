<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#2563eb" />
  <title>SpeakNote 語音筆記</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎙️</text></svg>" />
</head>
<body>

  <!-- ===== 側邊欄：筆記列表 ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h1 class="app-title">🎙️ SpeakNote</h1>
      <button class="btn-icon" id="btn-new-note" title="新增空白筆記">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>

    <div class="note-list" id="note-list">
      <!-- 由 JS 動態產生 -->
    </div>

    <div class="sidebar-footer">
      <span id="note-count">0 則筆記</span>
    </div>
  </aside>

  <!-- ===== 主區域 ===== -->
  <main class="main" id="main">

    <!-- 頂部工具列 -->
    <div class="toolbar">
      <button class="btn-icon sidebar-toggle" id="sidebar-toggle" title="切換側邊欄">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>

      <div class="note-meta" id="note-meta">
        <span id="note-title-display">—</span>
        <span id="note-date-display"></span>
      </div>

      <div class="toolbar-actions">
        <button class="btn-text" id="btn-copy" title="複製筆記內容" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          複製
        </button>
        <button class="btn-text" id="btn-export" title="下載為 .txt" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          下載
        </button>
        <button class="btn-text btn-danger" id="btn-delete" title="刪除此筆記" disabled>
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          刪除
        </button>
      </div>
    </div>

    <!-- 編輯區 -->
    <div class="editor-wrap" id="editor-wrap">
      <!-- 空狀態 -->
      <div class="empty-state" id="empty-state">
        <div class="empty-icon">🎙️</div>
        <p class="empty-title">還沒有筆記</p>
        <p class="empty-sub">按下錄音鍵開始，或點擊 <strong>＋</strong> 新增空白筆記</p>
      </div>

      <!-- 筆記編輯器 -->
      <textarea
        id="editor"
        class="editor hidden"
        placeholder="筆記內容會在這裡顯示，也可以直接打字編輯…"
        spellcheck="false"
      ></textarea>
    </div>

    <!-- 錄音控制區 -->
    <div class="record-bar">
      <!-- 語言選擇 -->
      <select id="lang-select" class="lang-select" title="辨識語言">
        <option value="zh-TW">中文（台灣）</option>
        <option value="zh-CN">中文（大陸）</option>
        <option value="en-US">English</option>
        <option value="ja-JP">日本語</option>
      </select>

      <!-- 即時轉錄預覽 -->
      <div class="interim-text" id="interim-text"></div>

      <!-- 錄音按鈕 -->
      <button class="btn-record" id="btn-record" title="開始錄音">
        <span class="record-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1a4 4 0 014 4v7a4 4 0 01-8 0V5a4 4 0 014-4z"/><path d="M19 10a7 7 0 01-14 0" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="19" x2="12" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="23" x2="16" y2="23" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        </span>
        <span class="record-label" id="record-label">開始錄音</span>
      </button>

      <!-- 狀態文字 -->
      <div class="record-status" id="record-status"></div>
    </div>

  </main>

  <!-- Toast 通知 -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
